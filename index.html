<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>我的猴子 3D WebAR Demo</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050505;
      color: #fff;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
    }
    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
    }
    #threeLayer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }
    .topbar {
      position: absolute;
      left: 12px;
      right: 12px;
      top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      z-index: 4;
      pointer-events: none;
    }
    .buttons {
      position: absolute;
      left: 50%;
      bottom: 84px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 4;
      pointer-events: auto;
      flex-wrap: wrap;
      justify-content: center;
      width: min(94vw, 620px);
    }
    .badge, button {
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.48);
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      backdrop-filter: blur(10px);
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(0,0,0,.22);
    }
    button { pointer-events: auto; cursor: pointer; font-size: 15px; }
    button:active { transform: scale(.96); }
    .hint {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(92vw, 560px);
      text-align: center;
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(0,0,0,.48);
      border: 1px solid rgba(255,255,255,.2);
      font-size: 14px;
      line-height: 1.45;
      pointer-events: none;
      z-index: 4;
    }
    .roarText {
      position: absolute;
      left: 50%;
      top: 22%;
      transform: translateX(-50%);
      font-size: clamp(32px, 10vw, 68px);
      font-weight: 950;
      letter-spacing: .06em;
      color: #ffe066;
      text-shadow: 0 0 18px rgba(255,190,60,.95), 0 6px 20px rgba(0,0,0,.65);
      opacity: 0;
      z-index: 5;
      pointer-events: none;
    }
    .roarText.show { animation: roarPopup .9s ease-out forwards; }
    .error {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      background: #111;
      z-index: 10;
      line-height: 1.7;
    }
    @keyframes roarPopup {
      0% { opacity: 0; transform: translateX(-50%) scale(.55) rotate(-4deg); }
      20% { opacity: 1; transform: translateX(-50%) scale(1.2) rotate(4deg); }
      55% { opacity: 1; transform: translateX(-50%) scale(1) rotate(-2deg); }
      100% { opacity: 0; transform: translateX(-50%) scale(1.35) translateY(-30px); }
    }
    @media (max-width: 520px) {
      .buttons { bottom: 96px; }
      .hint { font-size: 13px; }
      button { font-size: 14px; padding: 10px 12px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="camera" autoplay playsinline muted></video>
    <div id="threeLayer"></div>

    <div class="topbar">
      <div class="badge">我的猴子 3D WebAR</div>
      <button id="flipBtn">切換鏡頭</button>
    </div>

    <div class="buttons">
      <button id="bananaBtn">🍌 往猴子前方丟香蕉</button>
      <button id="roarBtn">🐵 猴子吼叫</button>
      <button id="resetBtn">重置位置</button>
    </div>

    <div id="roarText" class="roarText">嗚支嗚支！</div>
    <div class="hint">Repo 需要放：index.html + monkey.glb。拖曳畫面可旋轉猴子；香蕉會往猴子面前飛，抵達後爆炸。</div>
    <div id="error" class="error"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const video = document.getElementById('camera');
    const errorBox = document.getElementById('error');
    const flipBtn = document.getElementById('flipBtn');
    const bananaBtn = document.getElementById('bananaBtn');
    const roarBtn = document.getElementById('roarBtn');
    const resetBtn = document.getElementById('resetBtn');
    const roarText = document.getElementById('roarText');
    const threeLayer = document.getElementById('threeLayer');

    let currentStream = null;
    let facingMode = 'environment';

    async function startCamera() {
      try {
        if (currentStream) currentStream.getTracks().forEach(track => track.stop());
        currentStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: facingMode },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
        video.srcObject = currentStream;
        errorBox.style.display = 'none';
      } catch (err) {
        errorBox.style.display = 'flex';
        errorBox.innerHTML = `
          <div>
            <h2>無法開啟相機</h2>
            <p>請確認已允許瀏覽器相機權限。</p>
            <p>手機建議使用 Chrome / Safari，並透過 HTTPS 或 localhost 開啟。</p>
            <p style="opacity:.7">${err.message}</p>
          </div>
        `;
      }
    }

    flipBtn.addEventListener('click', () => {
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'none';
      startCamera();
    });

    startCamera();

    const scene = new THREE.Scene();
    const camera3D = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 100);
    camera3D.position.set(0, 0.25, 4.4);
    camera3D.lookAt(0, 0.15, 0);

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    threeLayer.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 1.05);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
    keyLight.position.set(3, 5, 4);
    keyLight.castShadow = true;
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0xffcc88, 1.4);
    rimLight.position.set(-4, 2, 3);
    scene.add(rimLight);

    const monkeyGroup = new THREE.Group();
    monkeyGroup.position.set(0, -0.15, 0);
    scene.add(monkeyGroup);

    let monkey = null;
    let bananas = [];
    let explosions = [];
    const clock = new THREE.Clock();

    function fallbackMonkey() {
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8b4f22, roughness: 0.52, metalness: 0.04 });
      const faceMat = new THREE.MeshStandardMaterial({ color: 0xf0b277, roughness: 0.7 });
      const darkMat = new THREE.MeshStandardMaterial({ color: 0x15100b, roughness: 0.45 });
      const group = new THREE.Group();

      const head = new THREE.Mesh(new THREE.SphereGeometry(0.75, 48, 32), bodyMat);
      head.scale.set(1, 1.05, 0.9);
      head.castShadow = true;
      group.add(head);

      const face = new THREE.Mesh(new THREE.SphereGeometry(0.46, 32, 24), faceMat);
      face.position.set(0, -0.1, 0.55);
      face.scale.set(1.05, 0.82, 0.36);
      face.castShadow = true;
      group.add(face);

      const earL = new THREE.Mesh(new THREE.SphereGeometry(0.26, 32, 24), bodyMat);
      earL.position.set(-0.67, 0.15, 0.02);
      earL.castShadow = true;
      group.add(earL);
      const earR = earL.clone();
      earR.position.x = 0.67;
      group.add(earR);

      const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.055, 16, 12), darkMat);
      eyeL.position.set(-0.23, 0.12, 0.77);
      group.add(eyeL);
      const eyeR = eyeL.clone();
      eyeR.position.x = 0.23;
      group.add(eyeR);

      const nose = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 12), darkMat);
      nose.position.set(0, -0.1, 0.83);
      nose.scale.set(1.3, 0.75, 0.55);
      group.add(nose);

      return group;
    }

    function fitModel(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);
      object.position.sub(center);
      const maxSide = Math.max(size.x, size.y, size.z) || 1;
      object.scale.multiplyScalar(1.75 / maxSide);
      object.rotation.y = Math.PI;
      object.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            child.material.roughness = child.material.roughness ?? 0.58;
          }
        }
      });
    }

    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      'monkey.glb',
      (gltf) => {
        monkey = gltf.scene;
        fitModel(monkey);
        monkeyGroup.add(monkey);
      },
      undefined,
      (error) => {
        console.error('monkey.glb 載入失敗，改用內建備援猴子：', error);
        monkey = fallbackMonkey();
        monkeyGroup.add(monkey);
      }
    );

    function makeBanana() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0xffdf3d, roughness: 0.42, metalness: 0.02 });
      const tipMat = new THREE.MeshStandardMaterial({ color: 0x6b3f16, roughness: 0.6 });
      const lineMat = new THREE.MeshStandardMaterial({ color: 0xf5b400, roughness: 0.55 });

      const curve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(-0.42, -0.04, 0),
        new THREE.Vector3(-0.2, 0.18, 0),
        new THREE.Vector3(0.16, 0.19, 0),
        new THREE.Vector3(0.42, -0.02, 0)
      ]);
      const bananaBody = new THREE.Mesh(new THREE.TubeGeometry(curve, 40, 0.065, 14, false), mat);
      bananaBody.castShadow = true;
      group.add(bananaBody);

      const line = new THREE.Mesh(new THREE.TubeGeometry(curve, 40, 0.018, 8, false), lineMat);
      line.position.z = 0.052;
      group.add(line);

      const tip1 = new THREE.Mesh(new THREE.SphereGeometry(0.075, 12, 8), tipMat);
      tip1.position.set(-0.42, -0.04, 0);
      group.add(tip1);
      const tip2 = tip1.clone();
      tip2.position.set(0.42, -0.02, 0);
      group.add(tip2);

      group.scale.setScalar(0.42);
      return group;
    }

    function createExplosion(position) {
      const group = new THREE.Group();
      group.position.copy(position);
      const colors = [0xffdd44, 0xff8c00, 0xff3d00, 0xffffff];

      for (let i = 0; i < 34; i++) {
        const color = colors[i % colors.length];
        const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
        const piece = new THREE.Mesh(new THREE.SphereGeometry(0.035 + Math.random() * 0.045, 10, 8), mat);
        piece.position.set(0, 0, 0);
        const dir = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2
        ).normalize();
        piece.userData.velocity = dir.multiplyScalar(1.1 + Math.random() * 2.1);
        piece.userData.life = 0.75;
        group.add(piece);
      }

      const ringMat = new THREE.MeshBasicMaterial({ color: 0xffe066, transparent: true, opacity: 0.85, side: THREE.DoubleSide });
      const ring = new THREE.Mesh(new THREE.RingGeometry(0.12, 0.16, 48), ringMat);
      ring.rotation.x = Math.PI / 2;
      ring.userData.isRing = true;
      group.add(ring);

      group.userData.life = 0.75;
      scene.add(group);
      explosions.push(group);
    }

    function throwBananaAtMonkey() {
      const banana = makeBanana();

      // 從鏡頭前方出現，往猴子面前飛去。
      const start = new THREE.Vector3(0, -0.45, 3.05);
      const target = new THREE.Vector3(0, 0.08, 0.72);
      const direction = new THREE.Vector3().subVectors(target, start).normalize();

      banana.position.copy(start);
      banana.rotation.set(0.45, 0.15, -0.75);
      banana.userData.velocity = direction.multiplyScalar(3.15);
      banana.userData.targetZ = target.z;
      banana.userData.life = 1.45;
      banana.userData.spin = new THREE.Vector3(7.5, 10.5, 15.0);
      banana.userData.exploded = false;
      scene.add(banana);
      bananas.push(banana);
    }

    bananaBtn.addEventListener('click', throwBananaAtMonkey);

    function monkeyRoar() {
      roarText.classList.remove('show');
      void roarText.offsetWidth;
      roarText.classList.add('show');

      if (monkeyGroup) {
        monkeyGroup.userData.roarTime = 0.65;
      }

      // 用 Web Speech API 發聲，不需要額外音檔。
      try {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance('嗚支嗚支');
        utter.lang = 'zh-TW';
        utter.rate = 1.25;
        utter.pitch = 1.55;
        utter.volume = 1;
        window.speechSynthesis.speak(utter);
      } catch (err) {
        console.warn('語音播放失敗：', err);
      }

      // 補一個簡單音效，避免部分手機不支援中文 TTS。
      playRoarBeep();
    }

    function playRoarBeep() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const now = ctx.currentTime;
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(0.35, now + 0.03);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);
        master.connect(ctx.destination);

        [620, 760, 520].forEach((freq, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(freq, now + index * 0.12);
          osc.frequency.exponentialRampToValueAtTime(freq * 0.72, now + index * 0.12 + 0.18);
          gain.gain.setValueAtTime(0.001, now + index * 0.12);
          gain.gain.exponentialRampToValueAtTime(0.55, now + index * 0.12 + 0.025);
          gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.12 + 0.18);
          osc.connect(gain).connect(master);
          osc.start(now + index * 0.12);
          osc.stop(now + index * 0.12 + 0.2);
        });

        setTimeout(() => ctx.close(), 900);
      } catch (err) {
        console.warn('音效播放失敗：', err);
      }
    }

    roarBtn.addEventListener('click', monkeyRoar);

    resetBtn.addEventListener('click', () => {
      monkeyGroup.position.set(0, -0.15, 0);
      monkeyGroup.rotation.set(0, 0, 0);
      monkeyGroup.scale.set(1, 1, 1);
    });

    let dragging = false;
    let lastX = 0;
    let lastY = 0;

    app.addEventListener('pointerdown', (e) => {
      // 避免按按鈕時也旋轉猴子。
      if (e.target.tagName === 'BUTTON') return;
      dragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });

    app.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      monkeyGroup.rotation.y += dx * 0.01;
      monkeyGroup.rotation.x += dy * 0.006;
    });

    app.addEventListener('pointerup', () => dragging = false);
    app.addEventListener('pointercancel', () => dragging = false);

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const elapsed = clock.elapsedTime;

      if (monkey) {
        monkeyGroup.rotation.y += dt * 0.18;
        monkeyGroup.position.y = -0.15 + Math.sin(elapsed * 2) * 0.03;
      }

      if (monkeyGroup.userData.roarTime && monkeyGroup.userData.roarTime > 0) {
        monkeyGroup.userData.roarTime -= dt;
        const shake = Math.sin(elapsed * 70) * 0.035 * (monkeyGroup.userData.roarTime / 0.65);
        monkeyGroup.scale.set(1 + Math.abs(shake) * 2.2, 1 + Math.abs(shake) * 1.4, 1 + Math.abs(shake) * 2.2);
        monkeyGroup.rotation.z = shake;
      } else {
        monkeyGroup.scale.lerp(new THREE.Vector3(1, 1, 1), 0.18);
        monkeyGroup.rotation.z *= 0.78;
      }

      bananas.forEach((banana) => {
        banana.userData.life -= dt;
        banana.position.addScaledVector(banana.userData.velocity, dt);
        banana.rotation.x += banana.userData.spin.x * dt;
        banana.rotation.y += banana.userData.spin.y * dt;
        banana.rotation.z += banana.userData.spin.z * dt;

        // 往前飛到猴子面前，接近目標位置就爆炸。
        if (!banana.userData.exploded && banana.position.z <= banana.userData.targetZ) {
          banana.userData.exploded = true;
          createExplosion(banana.position.clone());
          banana.userData.life = 0;
        }
      });

      bananas = bananas.filter((banana) => {
        if (banana.userData.life <= 0) {
          scene.remove(banana);
          return false;
        }
        return true;
      });

      explosions.forEach((explosion) => {
        explosion.userData.life -= dt;
        explosion.children.forEach((child) => {
          if (child.userData.isRing) {
            const scale = 1 + (0.75 - explosion.userData.life) * 7;
            child.scale.set(scale, scale, scale);
            child.material.opacity = Math.max(0, explosion.userData.life / 0.75);
          } else {
            child.position.addScaledVector(child.userData.velocity, dt);
            child.userData.velocity.multiplyScalar(0.96);
            child.material.opacity = Math.max(0, explosion.userData.life / 0.75);
          }
        });
      });

      explosions = explosions.filter((explosion) => {
        if (explosion.userData.life <= 0) {
          scene.remove(explosion);
          return false;
        }
        return true;
      });

      renderer.render(scene, camera3D);
    }
    animate();

    window.addEventListener('resize', () => {
      camera3D.aspect = window.innerWidth / window.innerHeight;
      camera3D.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
