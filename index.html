<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>我的猴子 3D WebAR Demo</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050505;
      color: white;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
    }
    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
    }
    #threeLayer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }
    .topbar {
      position: absolute;
      left: 12px;
      right: 12px;
      top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      z-index: 4;
      pointer-events: none;
    }
    .buttons {
      position: absolute;
      left: 50%;
      bottom: 84px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 4;
      pointer-events: auto;
    }
    .badge, button {
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.45);
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      backdrop-filter: blur(10px);
      font-weight: 800;
    }
    button { pointer-events: auto; cursor: pointer; font-size: 15px; }
    .hint {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(92vw, 520px);
      text-align: center;
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(0,0,0,.48);
      border: 1px solid rgba(255,255,255,.2);
      font-size: 14px;
      line-height: 1.45;
      pointer-events: none;
      z-index: 4;
    }
    .error {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      background: #111;
      z-index: 10;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="camera" autoplay playsinline muted></video>
    <div id="threeLayer"></div>

    <div class="topbar">
      <div class="badge">我的猴子 3D WebAR</div>
      <button id="flipBtn">切換鏡頭</button>
    </div>

    <div class="buttons">
      <button id="bananaBtn">🍌 丟香蕉</button>
      <button id="resetBtn">重置位置</button>
    </div>

    <div class="hint">手機開啟後允許相機權限。猴子為 3D OBJ 模型，可旋轉；按「丟香蕉」會產生 3D 香蕉飛出。</div>
    <div id="error" class="error"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

    const app = document.getElementById('app');
    const video = document.getElementById('camera');
    const errorBox = document.getElementById('error');
    const flipBtn = document.getElementById('flipBtn');
    const bananaBtn = document.getElementById('bananaBtn');
    const resetBtn = document.getElementById('resetBtn');
    const threeLayer = document.getElementById('threeLayer');

    let currentStream = null;
    let facingMode = 'environment';

    async function startCamera() {
      try {
        if (currentStream) currentStream.getTracks().forEach(track => track.stop());
        currentStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: facingMode },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
        video.srcObject = currentStream;
        errorBox.style.display = 'none';
      } catch (err) {
        errorBox.style.display = 'flex';
        errorBox.innerHTML = `
          <div>
            <h2>無法開啟相機</h2>
            <p>請確認已允許瀏覽器相機權限。</p>
            <p>手機建議使用 Chrome / Safari，並透過 HTTPS 或 localhost 開啟。</p>
            <p style="opacity:.7">${err.message}</p>
          </div>
        `;
      }
    }

    flipBtn.addEventListener('click', () => {
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'none';
      startCamera();
    });

    startCamera();

    const scene = new THREE.Scene();
    const camera3D = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 100);
    camera3D.position.set(0, 0.15, 4.2);

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    threeLayer.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 1.35);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
    keyLight.position.set(2.5, 4, 3);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffcc88, 1.1);
    fillLight.position.set(-3, 1.5, 2);
    scene.add(fillLight);

    const monkeyGroup = new THREE.Group();
    scene.add(monkeyGroup);

    let monkey = null;
    let bananas = [];
    const clock = new THREE.Clock();

    function fallbackMonkey() {
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8b4f22, roughness: 0.55, metalness: 0.05 });
      const faceMat = new THREE.MeshStandardMaterial({ color: 0xf0b277, roughness: 0.7 });
      const darkMat = new THREE.MeshStandardMaterial({ color: 0x15100b, roughness: 0.4 });

      const group = new THREE.Group();
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.75, 48, 32), bodyMat);
      head.scale.set(1, 1.05, 0.9);
      group.add(head);

      const face = new THREE.Mesh(new THREE.SphereGeometry(0.46, 32, 24), faceMat);
      face.position.set(0, -0.1, 0.55);
      face.scale.set(1.05, 0.82, 0.36);
      group.add(face);

      const earL = new THREE.Mesh(new THREE.SphereGeometry(0.26, 32, 24), bodyMat);
      earL.position.set(-0.67, 0.15, 0.02);
      group.add(earL);
      const earR = earL.clone();
      earR.position.x = 0.67;
      group.add(earR);

      const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.055, 16, 12), darkMat);
      eyeL.position.set(-0.23, 0.12, 0.77);
      group.add(eyeL);
      const eyeR = eyeL.clone();
      eyeR.position.x = 0.23;
      group.add(eyeR);

      const nose = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 12), darkMat);
      nose.position.set(0, -0.1, 0.83);
      nose.scale.set(1.3, 0.75, 0.55);
      group.add(nose);

      return group;
    }

    function fitModel(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      object.position.sub(center);
      const maxSide = Math.max(size.x, size.y, size.z) || 1;
      object.scale.multiplyScalar(1.8 / maxSide);
      object.rotation.set(0, Math.PI, 0);
    }

    const mtlLoader = new MTLLoader();
    mtlLoader.load(
      'monkey.mtl',
      (materials) => {
        materials.preload();
        const objLoader = new OBJLoader();
        objLoader.setMaterials(materials);
        objLoader.load(
          'monkey.obj',
          (object) => {
            monkey = object;
            fitModel(monkey);
            monkeyGroup.add(monkey);
          },
          undefined,
          () => {
            monkey = fallbackMonkey();
            monkeyGroup.add(monkey);
          }
        );
      },
      undefined,
      () => {
        monkey = fallbackMonkey();
        monkeyGroup.add(monkey);
      }
    );

    monkeyGroup.position.set(0, -0.05, 0);

    function makeBanana() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0xffdf3d, roughness: 0.45 });
      const tipMat = new THREE.MeshStandardMaterial({ color: 0x6b3f16, roughness: 0.55 });

      const curve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(-0.45, -0.05, 0),
        new THREE.Vector3(-0.2, 0.18, 0),
        new THREE.Vector3(0.18, 0.2, 0),
        new THREE.Vector3(0.45, -0.02, 0)
      ]);
      const banana = new THREE.Mesh(new THREE.TubeGeometry(curve, 32, 0.07, 12, false), mat);
      group.add(banana);

      const tip1 = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 8), tipMat);
      tip1.position.set(-0.45, -0.05, 0);
      group.add(tip1);
      const tip2 = tip1.clone();
      tip2.position.set(0.45, -0.02, 0);
      group.add(tip2);

      return group;
    }

    bananaBtn.addEventListener('click', () => {
      const banana = makeBanana();
      banana.position.set(0, 0, 1.3);
      banana.rotation.set(0.5, 0.2, -0.8);
      banana.userData.velocity = new THREE.Vector3((Math.random() - 0.5) * 0.7, 1.0 + Math.random() * 0.4, -2.6);
      banana.userData.spin = new THREE.Vector3(5, 8, 10);
      banana.userData.life = 1.4;
      scene.add(banana);
      bananas.push(banana);
    });

    resetBtn.addEventListener('click', () => {
      monkeyGroup.position.set(0, -0.05, 0);
      monkeyGroup.rotation.set(0, 0, 0);
    });

    let dragging = false;
    let lastX = 0;
    let lastY = 0;

    app.addEventListener('pointerdown', (e) => {
      dragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });

    app.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      monkeyGroup.rotation.y += dx * 0.01;
      monkeyGroup.rotation.x += dy * 0.006;
    });

    app.addEventListener('pointerup', () => dragging = false);
    app.addEventListener('pointercancel', () => dragging = false);

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      if (monkey) {
        monkeyGroup.rotation.y += dt * 0.28;
        monkeyGroup.position.y = -0.05 + Math.sin(clock.elapsedTime * 2) * 0.035;
      }

      bananas.forEach((banana) => {
        banana.userData.life -= dt;
        banana.position.addScaledVector(banana.userData.velocity, dt);
        banana.rotation.x += banana.userData.spin.x * dt;
        banana.rotation.y += banana.userData.spin.y * dt;
        banana.rotation.z += banana.userData.spin.z * dt;
        banana.scale.setScalar(Math.max(0.2, banana.userData.life / 1.4));
      });

      bananas = bananas.filter((banana) => {
        if (banana.userData.life <= 0) {
          scene.remove(banana);
          return false;
        }
        return true;
      });

      renderer.render(scene, camera3D);
    }
    animate();

    window.addEventListener('resize', () => {
      camera3D.aspect = window.innerWidth / window.innerHeight;
      camera3D.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
